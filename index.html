<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>大杂烩工具站</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #697386;
      --line: #e3e7ee;
      --accent: #1677ff;
      --accent-soft: #eaf3ff;
      --green: #0f8f60;
      --green-soft: #e9f8f0;
      --orange: #c76a14;
      --orange-soft: #fff4e6;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      width: min(100%, 640px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    }

    .header {
      padding: 8px 2px 18px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 750;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 6px;
    }

    .tool-card {
      display: grid;
      min-height: 148px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 8px 24px rgba(24, 32, 47, 0.05);
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .tool-card:active {
      transform: translateY(1px);
      background: #fbfcff;
    }

    .tool-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .tool-card:nth-child(2) .tool-icon {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .tool-card:nth-child(3) .tool-icon {
      background: var(--green-soft);
      color: var(--green);
    }

    .tool-content {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 78px;
      margin-top: 14px;
    }

    .tool-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .tool-name {
      display: block;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
    }

    .tool-desc {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .tool-arrow {
      color: var(--accent);
      font-size: 20px;
      line-height: 1;
    }

    .tool-card:nth-child(2) .tool-arrow {
      color: var(--orange);
    }

    .tool-card:nth-child(3) .tool-arrow {
      color: var(--green);
    }

    @media (min-width: 560px) {
      .page {
        width: min(100%, 760px);
      }

      .tool-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 380px) {
      .tool-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1 class="title">大杂烩工具站</h1>
      <p class="subtitle">轻量、直接、即开即用。</p>
    </header>

    <section class="tool-grid" aria-label="工具宫格">
      <a class="tool-card" href="./tools/typo-proofreader/" aria-label="打开错别字校对">
        <span class="tool-topline">
          <span class="tool-icon" aria-hidden="true">校</span>
          <span class="tool-arrow" aria-hidden="true">›</span>
        </span>
        <span class="tool-content">
          <span class="tool-name">错别字校对</span>
          <span class="tool-desc">粘贴文本，快速输出修正结果。</span>
        </span>
      </a>
      <a class="tool-card" href="./shooter.html" aria-label="打开飞机大战">
        <span class="tool-topline">
          <span class="tool-icon" aria-hidden="true">战</span>
          <span class="tool-arrow" aria-hidden="true">›</span>
        </span>
        <span class="tool-content">
          <span class="tool-name">飞机大战</span>
          <span class="tool-desc">割草无双小游戏，自动开火，走位清屏。</span>
        </span>
      </a>
      <a class="tool-card" href="https://note.688680.xyz/" aria-label="打开临时笔记本">
        <span class="tool-topline">
          <span class="tool-icon" aria-hidden="true">记</span>
          <span class="tool-arrow" aria-hidden="true">›</span>
        </span>
        <span class="tool-content">
          <span class="tool-name">临时笔记本</span>
          <span class="tool-desc">免登录笔记空间，快速访问和复制内容。</span>
        </span>
      </a>
      <a class="tool-card stock-card" href="./tools/stock-ytd-ranking/" aria-label="打开A股年内表现">
        <span class="tool-topline">
          <span class="tool-icon" aria-hidden="true">股</span>
          <span class="tool-arrow" aria-hidden="true">›</span>
        </span>
        <span class="tool-content">
          <span class="tool-name">A股年内表现</span>
          <span class="tool-desc">查询个股 YTD 和市场排名。</span>
        </span>
      </a>
    </section>
  </main>
</body>
</html>
