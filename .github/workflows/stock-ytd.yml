name: Stock YTD snapshot

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/stock-ytd.yml
      - api/stock-publish.js
      - lib/stockPublishAuth.js
      - lib/stockPublishedSnapshot.js
      - lib/stockSnapshot.js
      - lib/stockEmYtd.js
      - lib/stockTradingDates.js
      - scripts/refresh-stock-ytd-em.js
      - scripts/upload-interval-daily.js
  schedule:
    # 北京时间工作日 16:07 主刷新（收盘 15:00 后 f25 即终值，配合 16:00
    # 新鲜度截止点）；17:07 与 21:05 为自动重试窗口
    # （无新数据时 worker 以 no-op 结束，不重复发布）。
    - cron: "7 8 * * 1-5"
    - cron: "7 9 * * 1-5"
    - cron: "5 13 * * 1-5"
    # 21:35 数据完整性自检（最后一个重试窗口之后，失败即 run 红 = 告警邮件）。
    - cron: "35 13 * * 1-5"
    # 周六 10:35 全量回填：f25 精度日期每周洗成 qfq、修补空洞、重建演变聚合。
    - cron: "35 2 * * 6"
  workflow_dispatch:
    inputs:
      require_as_of:
        description: Optional YYYY-MM-DD trading date guard
        required: false
        type: string
      force:
        description: Republish even if the current snapshot is fresh
        required: false
        default: false
        type: boolean
      dry_run:
        description: Build and validate without publishing
        required: false
        default: false
        type: boolean
      backfill_daily:
        description: Run the interval-stats daily YTD backfill instead of the snapshot refresh
        required: false
        default: false
        type: boolean
      backfill_end:
        description: Optional YYYY-MM-DD backfill end trading date
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: stock-ytd-production
  cancel-in-progress: false

jobs:
  refresh:
    if: >-
      ${{ github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && !inputs.backfill_daily) ||
          (github.event_name == 'schedule' &&
           github.event.schedule != '35 2 * * 6' &&
           github.event.schedule != '35 13 * * 1-5') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      STOCK_PUBLISH_URL: https://1.688680.xyz/api/stock-publish
      REQUIRE_AS_OF: ${{ inputs.require_as_of || '' }}
      FORCE: ${{ inputs.force || false }}
      DRY_RUN: ${{ inputs.dry_run || false }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test snapshot pipeline
        run: npm run test:stock-free && node tests/stockEmYtd.test.js && npm run test:stock-interval

      - name: Refresh and publish snapshot
        shell: bash
        run: |
          args=()
          if [[ -n "$REQUIRE_AS_OF" ]]; then
            args+=(--require-as-of="$REQUIRE_AS_OF")
          fi
          if [[ "$FORCE" == "true" ]]; then
            args+=(--force)
          fi
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          else
            args+=(--publish-url="$STOCK_PUBLISH_URL")
          fi
          node scripts/refresh-stock-ytd-em.js "${args[@]}"

  # 数据完整性自检（只读公开接口）：READY、asOf 为最新交易日、
  # 基准日无空洞、演变聚合含当日。失败即 run 红，GitHub 邮件即告警。
  verify:
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '35 13 * * 1-5' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify production data integrity
        run: node scripts/verify-stock-live.js

  # 区间统计逐日 YTD 回填（INTERVAL_STATS.md Phase 2）：
  # 周六自动全量重灌（qfq 精度收敛 + 演变聚合重建），也可手工 dispatch；
  # Baostock 串行全量约 25-70 分钟。
  backfill-interval-daily:
    if: >-
      ${{ (github.event_name == 'workflow_dispatch' && inputs.backfill_daily) ||
          (github.event_name == 'schedule' && github.event.schedule == '35 2 * * 6') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      STOCK_PUBLISH_URL: https://1.688680.xyz/api/stock-publish
      BACKFILL_END: ${{ inputs.backfill_end || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --quiet baostock requests openpyxl

      - name: Test backfill pipeline
        run: |
          python tests/backfill_interval_daily_test.py
          npm run test:stock-interval

      - name: Build daily YTD backfill dataset
        shell: bash
        run: |
          args=(--output .stock-ytd-data/interval-backfill.json --progress-every 1000)
          if [[ -n "$BACKFILL_END" ]]; then
            args+=(--end="$BACKFILL_END")
          fi
          python scripts/backfill_interval_daily.py "${args[@]}"

      - name: Upload daily files
        run: |
          node scripts/upload-interval-daily.js \
            --input=.stock-ytd-data/interval-backfill.json \
            --publish-url="$STOCK_PUBLISH_URL"
