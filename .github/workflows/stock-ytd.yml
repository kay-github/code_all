name: Stock YTD snapshot

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/stock-ytd.yml
      - api/stock-publish.js
      - lib/stockPublishAuth.js
      - lib/stockPublishedSnapshot.js
      - lib/stockSnapshot.js
      - lib/stockEmYtd.js
      - scripts/refresh-stock-ytd-em.js
  schedule:
    # 北京时间工作日 18:35 主刷新；19:35 与 21:05 为自动重试窗口
    # （无新数据时 worker 以 no-op 结束，不重复发布）。
    - cron: "35 10 * * 1-5"
    - cron: "35 11 * * 1-5"
    - cron: "5 13 * * 1-5"
  workflow_dispatch:
    inputs:
      require_as_of:
        description: Optional YYYY-MM-DD trading date guard
        required: false
        type: string
      force:
        description: Republish even if the current snapshot is fresh
        required: false
        default: false
        type: boolean
      dry_run:
        description: Build and validate without publishing
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: stock-ytd-production
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      STOCK_PUBLISH_URL: https://1.688680.xyz/api/stock-publish
      REQUIRE_AS_OF: ${{ inputs.require_as_of || '' }}
      FORCE: ${{ inputs.force || false }}
      DRY_RUN: ${{ inputs.dry_run || false }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test snapshot pipeline
        run: npm run test:stock-free && node tests/stockEmYtd.test.js && npm run test:stock-interval

      - name: Refresh and publish snapshot
        shell: bash
        run: |
          args=()
          if [[ -n "$REQUIRE_AS_OF" ]]; then
            args+=(--require-as-of="$REQUIRE_AS_OF")
          fi
          if [[ "$FORCE" == "true" ]]; then
            args+=(--force)
          fi
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          else
            args+=(--publish-url="$STOCK_PUBLISH_URL")
          fi
          node scripts/refresh-stock-ytd-em.js "${args[@]}"
