<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>错别字校对</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #172033;
      --muted: #6c7586;
      --line: #dfe5ee;
      --accent: #1570ef;
      --accent-pressed: #0f5fcf;
      --danger: #c2410c;
      --success: #067647;
      --shadow: 0 10px 28px rgba(23, 32, 51, 0.06);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow-x: hidden;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      width: min(100%, 640px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(16px + env(safe-area-inset-top)) 14px calc(22px + env(safe-area-inset-bottom));
    }

    .topbar {
      padding: 8px 2px 14px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 800;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .shortcut-domain {
      display: inline-block;
      margin-left: 4px;
      padding: 1px 6px;
      border: 1px solid #d6e4fb;
      border-radius: 6px;
      background: #f3f8ff;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
      font-weight: 700;
    }

    .status-card {
      margin: 0 0 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      box-shadow: var(--shadow);
    }

    .status-card.is-ready {
      border-color: #b7e3c7;
      background: #f2fbf5;
      color: var(--success);
    }

    .status-card.is-error {
      border-color: #fed7aa;
      background: #fff7ed;
      color: var(--danger);
    }

    .status-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .status-toggle:disabled {
      cursor: default;
    }

    .status-arrow {
      flex: none;
      transition: transform 0.2s ease;
    }

    .status-card.is-expanded .status-arrow {
      transform: rotate(180deg);
    }

    .provider-list {
      margin: 8px 0 0;
      padding: 8px 0 0;
      border-top: 1px dashed var(--line);
      list-style: none;
      color: var(--muted);
    }

    .provider-list li {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
    }

    .provider-dot {
      flex: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cbd5e1;
    }

    .provider-dot.is-ok {
      background: #22c55e;
    }

    .provider-dot.is-down {
      background: #f97316;
    }

    .provider-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .provider-note {
      margin-left: auto;
      flex: none;
      font-size: 12px;
    }

    .tabbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 0 0 14px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .tab-button {
      min-height: 42px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-button.is-active {
      background: var(--accent);
      color: #fff;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.is-active {
      display: block;
    }

    .editor {
      display: grid;
      gap: 12px;
    }

    .source-wrap {
      position: relative;
    }

    .source-wrap.has-highlights .text-box {
      background: transparent;
      color: transparent;
      caret-color: var(--text);
      box-shadow: none;
    }

    .text-box {
      width: 100%;
      height: clamp(300px, 50dvh, 560px);
      min-height: 300px;
      padding: 14px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      outline: none;
      font-size: 16px;
      line-height: 1.7;
      overflow-wrap: break-word;
    }

    .text-highlight {
      display: none;
      position: absolute;
      inset: 0;
      padding: 14px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      font-size: 16px;
      line-height: 1.7;
      overflow: auto;
      overflow-wrap: break-word;
      pointer-events: none;
      white-space: pre-wrap;
      word-break: break-word;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .text-highlight::-webkit-scrollbar {
      display: none;
    }

    .source-wrap.has-highlights .text-highlight {
      display: block;
    }

    .source-error {
      border-radius: 3px;
      background: rgba(194, 65, 12, 0.12);
      color: var(--danger);
      font-weight: 800;
    }

    .text-box::placeholder {
      color: #9aa3b2;
    }

    .text-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 112, 239, 0.12), var(--shadow);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .secondary-button {
      min-height: 44px;
      border: 1px solid #c7d7f2;
      border-radius: var(--radius);
      background: #eef5ff;
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary-button:active {
      background: #dfecff;
    }

    .panel-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: -4px 2px 0;
    }

    .google-switch {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      cursor: pointer;
      user-select: none;
    }

    .google-switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch-track {
      position: relative;
      flex: none;
      width: 34px;
      height: 20px;
      border-radius: 999px;
      background: #cbd5e1;
      transition: background 0.18s ease;
    }

    .switch-track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 2px rgba(23, 32, 51, 0.25);
      transition: transform 0.18s ease;
    }

    .google-switch input:checked + .switch-track {
      background: var(--accent);
    }

    .google-switch input:checked + .switch-track::after {
      transform: translateX(14px);
    }

    .google-switch input:checked ~ .switch-label {
      color: var(--accent);
      font-weight: 700;
    }

    .counter {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      text-align: right;
    }

    .counter.is-over-limit {
      color: var(--danger);
      font-weight: 700;
    }

    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 17px;
      font-weight: 750;
      cursor: pointer;
    }

    .primary-button:active {
      background: var(--accent-pressed);
    }

    .primary-button:disabled {
      cursor: default;
      opacity: 0.72;
    }

    .help-text {
      margin: -2px 2px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .panel-intro {
      margin: 0 2px 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .highlight-hint {
      display: none;
      margin: -4px 2px 0;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.5;
    }

    .highlight-hint.is-visible {
      display: block;
    }

    .result {
      display: none;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .result.is-visible {
      display: block;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 12px 0;
    }

    .result-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 750;
    }

    .copy-button {
      flex: 0 0 auto;
      min-width: 82px;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid #b9cff4;
      border-radius: var(--radius);
      background: #eef5ff;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .copy-button:active {
      background: #dfecff;
    }

    .result-meta {
      margin: 6px 12px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .result-text {
      width: 100%;
      min-height: 220px;
      max-height: 50dvh;
      margin-top: 8px;
      padding: 0 12px 14px;
      border: 0;
      background: transparent;
      color: var(--text);
      resize: vertical;
      outline: none;
      font-size: 16px;
      line-height: 1.7;
      overflow-wrap: break-word;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 10;
      max-width: calc(100vw - 32px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(23, 32, 51, 0.92);
      color: #fff;
      font-size: 14px;
      line-height: 1.4;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 360px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .title {
        font-size: 22px;
      }

      .text-box {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <h1 class="title">错别字校对</h1>
      <p class="subtitle">快速访问：<span class="shortcut-domain">1.688680.xyz/cbz</span></p>
    </header>

    <div id="statusCard" class="status-card">
      <button id="statusToggle" class="status-toggle" type="button" aria-expanded="false" aria-controls="providerList" disabled>
        <span id="modelStatus" class="status-text">正在检查校对服务...</span>
        <span id="statusArrow" class="status-arrow" aria-hidden="true" hidden>▾</span>
      </button>
      <ul id="providerList" class="provider-list" hidden></ul>
    </div>

    <div class="tabbar" role="tablist" aria-label="校对模式">
      <button id="tabTypo" class="tab-button is-active" type="button" role="tab" aria-selected="true" aria-controls="panelTypo">错别字校对</button>
      <button id="tabDeep" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="panelDeep">深度校对</button>
    </div>

    <section id="panelTypo" class="tab-panel is-active" data-mode="typo" role="tabpanel" aria-labelledby="tabTypo">
      <section class="editor" aria-label="错别字校对">
        <div class="source-wrap">
          <div class="text-highlight" aria-hidden="true"></div>
          <textarea class="text-box" placeholder="请输入或粘贴待校对的文本内容"></textarea>
        </div>
        <p class="highlight-hint">红色标记为本次校对发现的疑似错字或错误标点。</p>
        <div class="toolbar" aria-label="快捷操作">
          <button class="sample-button secondary-button" type="button">填入示例</button>
          <button class="clear-button secondary-button" type="button">清空内容</button>
        </div>
        <div class="panel-foot">
          <label class="google-switch">
            <input class="google-toggle" type="checkbox">
            <span class="switch-track" aria-hidden="true"></span>
            <span class="switch-label">优先用 Google 模型</span>
          </label>
          <div class="counter">0 / 5000</div>
        </div>
        <button class="proofread-button primary-button" type="button">开始校对</button>
      </section>

      <section class="result" aria-label="校对结果">
        <div class="result-head">
          <h2 class="result-title">校对结果</h2>
          <button class="copy-button" type="button">复制</button>
        </div>
        <p class="result-meta"></p>
        <textarea class="result-text" readonly></textarea>
      </section>
    </section>

    <section id="panelDeep" class="tab-panel" data-mode="deep" role="tabpanel" aria-labelledby="tabDeep" hidden>
      <p class="panel-intro">在错别字、标点校对的基础上，同时修正逻辑不通、逻辑混乱的语句，以及重复表达的语句。</p>
      <section class="editor" aria-label="深度校对">
        <div class="source-wrap">
          <div class="text-highlight" aria-hidden="true"></div>
          <textarea class="text-box" placeholder="请输入或粘贴待深度校对的文本内容"></textarea>
        </div>
        <p class="highlight-hint">红色标记为本次校对发现的错字、标点、逻辑或重复问题。</p>
        <div class="toolbar" aria-label="快捷操作">
          <button class="sample-button secondary-button" type="button">填入示例</button>
          <button class="clear-button secondary-button" type="button">清空内容</button>
        </div>
        <div class="panel-foot">
          <label class="google-switch">
            <input class="google-toggle" type="checkbox">
            <span class="switch-track" aria-hidden="true"></span>
            <span class="switch-label">优先用 Google 模型</span>
          </label>
          <div class="counter">0 / 5000</div>
        </div>
        <button class="proofread-button primary-button" type="button">开始校对</button>
      </section>

      <section class="result" aria-label="校对结果">
        <div class="result-head">
          <h2 class="result-title">校对结果</h2>
          <button class="copy-button" type="button">复制</button>
        </div>
        <p class="result-meta"></p>
        <textarea class="result-text" readonly></textarea>
      </section>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    // API 配置区：后端保存 API Key，前端只请求自己的后端接口。
    const API_CONFIG = {
      mode: "serverless", // serverless 使用 Vercel API；openaiCompatible 可切换为兼容官方消息格式的接口
      endpoint: "/api/proofread",
      healthEndpoint: "/api/health",
      apiKey: "", // TODO: 如必须前端直连官方 API，可填写测试 Key；不要把真实 Key 提交到公开仓库
      model: "", // TODO: 填写模型名称，由实际接入方决定
      maxTextChars: 5000,
      requestTimeoutMs: 300000
    };

    const PANEL_PRESETS = {
      typo: {
        sampleText: "今天新情很好，我想去公圆玩。少先队员因该为老人让坐。你找到你最喜欢的工作，我也很高心。",
        emptyResultLabel: "未发现明显错误",
        foundLabel: "处疑似错误"
      },
      deep: {
        sampleText: "今天新情很好，我想去公圆玩。因为他生病了，所以他坚持来上班。我们要提高工作效率，我们要把工作效率提上去。",
        emptyResultLabel: "未发现明显问题",
        foundLabel: "处疑似问题"
      }
    };

    const PROOFREAD_PROMPT = [
      "你是一个严格的中文错别字校对工具。",
      "只修正文本中的错别字、多字、漏字，以及明显使用错误的标点符号。",
      "绝对不改动原文句式、语序、用词和表达逻辑。",
      "禁止润色、扩写、缩写、风格调整，禁止输出解释、说明、评语、前后缀话术。",
      "如果没有需要修正的内容，原样返回。",
      "只输出修正后的完整文本。"
    ].join("\n");

    const modelStatus = document.querySelector("#modelStatus");
    const statusCard = document.querySelector("#statusCard");
    const statusToggle = document.querySelector("#statusToggle");
    const statusArrow = document.querySelector("#statusArrow");
    const providerList = document.querySelector("#providerList");
    const toast = document.querySelector("#toast");

    let toastTimer = 0;
    let serviceInfo = {
      provider: "线上校对服务",
      model: "",
      maxTextChars: API_CONFIG.maxTextChars
    };
    const panels = [];

    function showToast(message) {
      window.clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("is-visible");
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("is-visible");
      }, 1800);
    }

    function setStatus(message, type = "") {
      modelStatus.textContent = message;
      statusCard.classList.toggle("is-ready", type === "ready");
      statusCard.classList.toggle("is-error", type === "error");
    }

    function renderProviderList(providers) {
      if (!Array.isArray(providers) || !providers.length) {
        statusToggle.disabled = true;
        statusArrow.hidden = true;
        return;
      }

      statusToggle.disabled = false;
      statusArrow.hidden = false;
      providerList.innerHTML = providers.map((item) => {
        const available = item.configured && !item.coolingDown;
        const dotClass = available ? "is-ok" : (item.configured ? "is-down" : "");
        const note = available ? "可用" : (item.configured ? "暂不可用" : "未配置");
        const label = [item.name, item.model].filter(Boolean).join(" / ");
        return `<li><span class="provider-dot ${dotClass}"></span><span class="provider-name">${escapeHtml(label)}</span><span class="provider-note">${note}</span></li>`;
      }).join("");
    }

    statusToggle.addEventListener("click", () => {
      if (statusToggle.disabled) {
        return;
      }
      const expanded = providerList.hidden;
      providerList.hidden = !expanded;
      statusCard.classList.toggle("is-expanded", expanded);
      statusToggle.setAttribute("aria-expanded", String(expanded));
    });

    function getModelLabel() {
      return [serviceInfo.provider, serviceInfo.model].filter(Boolean).join(" / ") || "线上校对服务";
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"]/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;"
      })[char]);
    }

    function normalizeCorrections(text, corrections) {
      if (!Array.isArray(corrections)) {
        return [];
      }

      const ranges = corrections.map((item) => {
        const start = Number.isInteger(item?.start) ? item.start : item?.index;
        const source = typeof item?.source === "string" ? item.source : "";
        const end = Number.isInteger(item?.end) ? item.end : start + source.length;

        return {
          start,
          end,
          source,
          target: typeof item?.target === "string" ? item.target : ""
        };
      }).filter((item) => (
        Number.isInteger(item.start) &&
        Number.isInteger(item.end) &&
        item.start >= 0 &&
        item.end > item.start &&
        item.end <= text.length
      )).sort((left, right) => left.start - right.start || right.end - left.end);

      const filtered = [];
      let cursor = 0;
      for (const item of ranges) {
        if (item.start >= cursor) {
          filtered.push(item);
          cursor = item.end;
        }
      }

      return filtered;
    }

    async function checkService() {
      if (!API_CONFIG.healthEndpoint) {
        setStatus("已配置外部校对接口，请确认接口服务可用。", "ready");
        return;
      }

      try {
        const response = await fetch(API_CONFIG.healthEndpoint);
        if (!response.ok) {
          throw new Error("HEALTH_CHECK_FAILED");
        }

        const data = await response.json();
        serviceInfo = {
          provider: data?.provider || serviceInfo.provider,
          model: data?.model || serviceInfo.model,
          maxTextChars: data?.maxTextChars || serviceInfo.maxTextChars
        };
        panels.forEach((panel) => panel.updateCharCounter());
        renderProviderList(data?.providers);
        setStatus(`校对服务已就绪：${getModelLabel()}。`, "ready");
      } catch {
        renderProviderList([]);
        providerList.hidden = true;
        statusCard.classList.remove("is-expanded");
        statusToggle.setAttribute("aria-expanded", "false");
        setStatus("未连接到校对服务，请稍后刷新；本地预览请使用 vercel dev 或 python server.py。", "error");
      }
    }

    function ensureApiReady() {
      return Boolean(API_CONFIG.endpoint);
    }

    function buildRequestBody(text, mode, preferGoogle) {
      if (API_CONFIG.mode === "serverless") {
        return { text, mode, preferGoogle };
      }

      return {
        model: API_CONFIG.model,
        messages: [
          { role: "system", content: PROOFREAD_PROMPT },
          { role: "user", content: text }
        ],
        temperature: 0
      };
    }

    function readApiResult(data) {
      return (
        data?.choices?.[0]?.message?.content ??
        data?.output_text ??
        data?.correctedText ??
        data?.result ??
        data?.text ??
        ""
      );
    }

    async function requestProofread(text, mode, preferGoogle) {
      if (!ensureApiReady()) {
        throw new Error("API_NOT_CONFIGURED");
      }

      const headers = { "Content-Type": "application/json" };
      if (API_CONFIG.apiKey) {
        headers.Authorization = `Bearer ${API_CONFIG.apiKey}`;
      }

      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), API_CONFIG.requestTimeoutMs);

      let response;
      try {
        response = await fetch(API_CONFIG.endpoint, {
          method: "POST",
          headers,
          body: JSON.stringify(buildRequestBody(text, mode, preferGoogle)),
          signal: controller.signal
        });
      } catch (error) {
        if (error.name === "AbortError") {
          throw new Error("校对超时，请稍后重试或缩短文本");
        }
        throw new Error("校对服务连接失败，请稍后刷新重试");
      } finally {
        window.clearTimeout(timeoutId);
      }

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData?.message || "API_REQUEST_FAILED");
      }

      const data = await response.json();
      const corrected = readApiResult(data);

      if (typeof corrected !== "string" || corrected.length === 0) {
        throw new Error("API_RESULT_EMPTY");
      }

      return {
        corrected,
        corrections: Array.isArray(data?.corrections) ? data.corrections : [],
        provider: typeof data?.provider === "string" ? data.provider : "",
        model: typeof data?.model === "string" ? data.model : ""
      };
    }

    function setupPanel(panelRoot) {
      const mode = panelRoot.dataset.mode || "typo";
      const preset = PANEL_PRESETS[mode] || PANEL_PRESETS.typo;
      const sourceText = panelRoot.querySelector(".text-box");
      const sourceWrap = panelRoot.querySelector(".source-wrap");
      const sourceHighlight = panelRoot.querySelector(".text-highlight");
      const highlightHint = panelRoot.querySelector(".highlight-hint");
      const resultPanel = panelRoot.querySelector(".result");
      const resultText = panelRoot.querySelector(".result-text");
      const resultMeta = panelRoot.querySelector(".result-meta");
      const proofreadButton = panelRoot.querySelector(".proofread-button");
      const sampleButton = panelRoot.querySelector(".sample-button");
      const clearButton = panelRoot.querySelector(".clear-button");
      const copyButton = panelRoot.querySelector(".copy-button");
      const googleToggle = panelRoot.querySelector(".google-toggle");
      const charCounter = panelRoot.querySelector(".counter");
      const googleStorageKey = `typoProofreader.preferGoogle.${mode}`;

      try {
        googleToggle.checked = window.localStorage.getItem(googleStorageKey) === "1";
      } catch {
        // localStorage 不可用时保持默认不勾选
      }

      googleToggle.addEventListener("change", () => {
        try {
          window.localStorage.setItem(googleStorageKey, googleToggle.checked ? "1" : "0");
        } catch {
          // 忽略存储失败
        }
      });

      function setLoading(isLoading) {
        proofreadButton.disabled = isLoading;
        proofreadButton.textContent = isLoading ? "校对中..." : "开始校对";
      }

      function updateCharCounter() {
        const length = sourceText.value.length;
        charCounter.textContent = `${length} / ${serviceInfo.maxTextChars}`;
        charCounter.classList.toggle("is-over-limit", length > serviceInfo.maxTextChars);
      }

      function clearSourceHighlights() {
        sourceHighlight.innerHTML = "";
        sourceWrap.classList.remove("has-highlights");
        highlightHint.classList.remove("is-visible");
      }

      function syncHighlightScroll() {
        sourceHighlight.scrollTop = sourceText.scrollTop;
        sourceHighlight.scrollLeft = sourceText.scrollLeft;
      }

      function renderSourceHighlights(corrections) {
        const text = sourceText.value;
        const ranges = normalizeCorrections(text, corrections);

        if (ranges.length === 0) {
          clearSourceHighlights();
          return 0;
        }

        let html = "";
        let cursor = 0;
        for (const item of ranges) {
          html += escapeHtml(text.slice(cursor, item.start));
          const title = item.target ? ` title="${escapeHtml(item.source)} → ${escapeHtml(item.target)}"` : "";
          html += `<mark class="source-error"${title}>${escapeHtml(text.slice(item.start, item.end))}</mark>`;
          cursor = item.end;
        }
        html += escapeHtml(text.slice(cursor));

        sourceHighlight.innerHTML = html;
        sourceWrap.classList.add("has-highlights");
        highlightHint.classList.add("is-visible");
        syncHighlightScroll();
        return ranges.length;
      }

      async function handleProofread() {
        const text = sourceText.value;

        if (!text.trim()) {
          showToast("请输入待校对文本");
          sourceText.focus();
          return;
        }

        if (text.length > serviceInfo.maxTextChars) {
          showToast(`文本过长，请控制在 ${serviceInfo.maxTextChars} 字以内`);
          return;
        }

        setLoading(true);

        try {
          const { corrected, corrections, provider, model } = await requestProofread(text, mode, googleToggle.checked);
          const correctionCount = renderSourceHighlights(corrections);
          const usedLabel = [provider, model].filter(Boolean).join(" / ") || getModelLabel();
          resultText.value = corrected;
          resultMeta.textContent = `使用 ${usedLabel} · 原文 ${text.length} 字 · ${correctionCount ? `发现 ${correctionCount} ${preset.foundLabel}` : preset.emptyResultLabel}`;
          resultPanel.classList.add("is-visible");
          showToast(correctionCount ? `已完成校对，发现 ${correctionCount} ${preset.foundLabel}` : `已完成校对，${preset.emptyResultLabel}`);
          checkService();
        } catch (error) {
          if (error.message === "API_NOT_CONFIGURED") {
            showToast("请先配置校对接口");
          } else if (error.message && error.message !== "API_REQUEST_FAILED") {
            showToast(error.message);
          } else {
            showToast("校对失败，请稍后重试");
          }
        } finally {
          setLoading(false);
        }
      }

      function fillSample() {
        sourceText.value = preset.sampleText;
        clearSourceHighlights();
        resultPanel.classList.remove("is-visible");
        resultText.value = "";
        resultMeta.textContent = "";
        updateCharCounter();
        sourceText.focus();
      }

      function clearAll() {
        sourceText.value = "";
        clearSourceHighlights();
        resultText.value = "";
        resultMeta.textContent = "";
        resultPanel.classList.remove("is-visible");
        updateCharCounter();
        sourceText.focus();
      }

      function copyBySelection() {
        resultText.focus();
        resultText.select();
        const copied = document.execCommand("copy");
        window.getSelection()?.removeAllRanges();

        if (!copied) {
          throw new Error("COPY_FAILED");
        }
      }

      async function copyResult() {
        if (!resultText.value) {
          return;
        }

        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(resultText.value);
          } else {
            copyBySelection();
          }
          showToast("复制成功");
        } catch {
          try {
            copyBySelection();
            showToast("复制成功");
          } catch {
            showToast("复制失败，请手动复制");
          }
        }
      }

      function handleSourceInput() {
        updateCharCounter();
        clearSourceHighlights();
      }

      sourceText.addEventListener("input", handleSourceInput);
      sourceText.addEventListener("scroll", syncHighlightScroll);
      sampleButton.addEventListener("click", fillSample);
      clearButton.addEventListener("click", clearAll);
      proofreadButton.addEventListener("click", handleProofread);
      copyButton.addEventListener("click", copyResult);
      updateCharCounter();

      return { updateCharCounter };
    }

    const tabButtons = Array.from(document.querySelectorAll(".tab-button"));
    const tabPanels = Array.from(document.querySelectorAll(".tab-panel"));

    tabButtons.forEach((button) => {
      button.addEventListener("click", () => {
        tabButtons.forEach((item) => {
          const active = item === button;
          item.classList.toggle("is-active", active);
          item.setAttribute("aria-selected", String(active));
        });
        tabPanels.forEach((panel) => {
          const active = panel.id === button.getAttribute("aria-controls");
          panel.classList.toggle("is-active", active);
          panel.hidden = !active;
        });
      });
    });

    tabPanels.forEach((panel) => {
      panels.push(setupPanel(panel));
    });

    checkService();
  </script>
</body>
</html>
