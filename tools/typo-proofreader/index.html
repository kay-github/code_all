<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>错别字校对</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #172033;
      --muted: #6c7586;
      --line: #dfe5ee;
      --accent: #1570ef;
      --accent-pressed: #0f5fcf;
      --danger: #c2410c;
      --success: #067647;
      --shadow: 0 10px 28px rgba(23, 32, 51, 0.06);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow-x: hidden;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      width: min(100%, 640px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(16px + env(safe-area-inset-top)) 14px calc(22px + env(safe-area-inset-bottom));
    }

    .topbar {
      padding: 8px 2px 14px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 800;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .status-card {
      margin: 0 0 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      box-shadow: var(--shadow);
    }

    .status-card.is-ready {
      border-color: #b7e3c7;
      background: #f2fbf5;
      color: var(--success);
    }

    .status-card.is-error {
      border-color: #fed7aa;
      background: #fff7ed;
      color: var(--danger);
    }

    .editor {
      display: grid;
      gap: 12px;
    }

    .text-box {
      width: 100%;
      height: clamp(300px, 50dvh, 560px);
      min-height: 300px;
      padding: 14px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      outline: none;
      font-size: 16px;
      line-height: 1.7;
      overflow-wrap: break-word;
    }

    .text-box::placeholder {
      color: #9aa3b2;
    }

    .text-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 112, 239, 0.12), var(--shadow);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .secondary-button {
      min-height: 44px;
      border: 1px solid #c7d7f2;
      border-radius: var(--radius);
      background: #eef5ff;
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary-button:active {
      background: #dfecff;
    }

    .counter {
      margin: -4px 2px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      text-align: right;
    }

    .counter.is-over-limit {
      color: var(--danger);
      font-weight: 700;
    }

    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 17px;
      font-weight: 750;
      cursor: pointer;
    }

    .primary-button:active {
      background: var(--accent-pressed);
    }

    .primary-button:disabled {
      cursor: default;
      opacity: 0.72;
    }

    .help-text {
      margin: -2px 2px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .result {
      display: none;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .result.is-visible {
      display: block;
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 12px 0;
    }

    .result-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 750;
    }

    .copy-button {
      flex: 0 0 auto;
      min-width: 82px;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid #b9cff4;
      border-radius: var(--radius);
      background: #eef5ff;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .copy-button:active {
      background: #dfecff;
    }

    .result-meta {
      margin: 6px 12px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .result-text {
      width: 100%;
      min-height: 220px;
      max-height: 50dvh;
      margin-top: 8px;
      padding: 0 12px 14px;
      border: 0;
      background: transparent;
      color: var(--text);
      resize: vertical;
      outline: none;
      font-size: 16px;
      line-height: 1.7;
      overflow-wrap: break-word;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 10;
      max-width: calc(100vw - 32px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(23, 32, 51, 0.92);
      color: #fff;
      font-size: 14px;
      line-height: 1.4;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 360px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .title {
        font-size: 22px;
      }

      .text-box {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <h1 class="title">错别字校对</h1>
      <p class="subtitle">使用免费开源中文纠错模型，本地后端完成校对，适合作为产品演示版。</p>
    </header>

    <p id="modelStatus" class="status-card">正在检查本地校对服务...</p>

    <section class="editor" aria-label="错别字校对">
      <textarea id="sourceText" class="text-box" placeholder="请输入或粘贴待校对的文本内容"></textarea>
      <div class="toolbar" aria-label="快捷操作">
        <button id="sampleButton" class="secondary-button" type="button">填入示例</button>
        <button id="clearButton" class="secondary-button" type="button">清空内容</button>
      </div>
      <div id="charCounter" class="counter">0 / 5000</div>
      <button id="proofreadButton" class="primary-button" type="button">开始校对</button>
      <p class="help-text">首次校对会自动下载并加载模型，耗时取决于网络和机器性能；后续请求会复用模型。</p>
    </section>

    <section id="resultPanel" class="result" aria-label="校对结果">
      <div class="result-head">
        <h2 class="result-title">校对结果</h2>
        <button id="copyButton" class="copy-button" type="button">复制</button>
      </div>
      <p id="resultMeta" class="result-meta"></p>
      <textarea id="resultText" class="result-text" readonly></textarea>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    // API 配置区：后续接入大模型时填写。正式上线建议由后端保存 API Key，前端只请求自己的后端接口。
    const API_CONFIG = {
      mode: "local", // local 使用本仓库 server.py；openaiCompatible 可切换为兼容官方消息格式的接口
      endpoint: "/api/proofread", // 本地 demo 接口；部署到后端后可替换为 https://api.example.com/proofread
      healthEndpoint: "/api/health",
      apiKey: "", // TODO: 如必须前端直连官方 API，可填写测试 Key；不要把真实 Key 提交到公开仓库
      model: "", // TODO: 填写模型名称，由实际接入方决定
      maxTextChars: 5000,
      requestTimeoutMs: 300000
    };

    const SAMPLE_TEXT = "今天新情很好，我想去公圆玩。少先队员因该为老人让坐。你找到你最喜欢的工作，我也很高心。";

    const PROOFREAD_PROMPT = [
      "你是一个严格的中文错别字校对工具。",
      "只修正文本中的错别字、多字、漏字，以及明显使用错误的标点符号。",
      "绝对不改动原文句式、语序、用词和表达逻辑。",
      "禁止润色、扩写、缩写、风格调整，禁止输出解释、说明、评语、前后缀话术。",
      "如果没有需要修正的内容，原样返回。",
      "只输出修正后的完整文本。"
    ].join("\n");

    const sourceText = document.querySelector("#sourceText");
    const resultPanel = document.querySelector("#resultPanel");
    const resultText = document.querySelector("#resultText");
    const resultMeta = document.querySelector("#resultMeta");
    const proofreadButton = document.querySelector("#proofreadButton");
    const sampleButton = document.querySelector("#sampleButton");
    const clearButton = document.querySelector("#clearButton");
    const copyButton = document.querySelector("#copyButton");
    const modelStatus = document.querySelector("#modelStatus");
    const charCounter = document.querySelector("#charCounter");
    const toast = document.querySelector("#toast");

    let toastTimer = 0;
    let serviceInfo = {
      provider: "免费本地模型",
      model: "",
      maxTextChars: API_CONFIG.maxTextChars
    };

    function showToast(message) {
      window.clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("is-visible");
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("is-visible");
      }, 1800);
    }

    function setLoading(isLoading) {
      proofreadButton.disabled = isLoading;
      proofreadButton.textContent = isLoading ? "校对中..." : "开始校对";
    }

    function setStatus(message, type = "") {
      modelStatus.textContent = message;
      modelStatus.classList.toggle("is-ready", type === "ready");
      modelStatus.classList.toggle("is-error", type === "error");
    }

    function getModelLabel() {
      return [serviceInfo.provider, serviceInfo.model].filter(Boolean).join(" / ") || "免费本地模型";
    }

    function updateCharCounter() {
      const length = sourceText.value.length;
      charCounter.textContent = `${length} / ${serviceInfo.maxTextChars}`;
      charCounter.classList.toggle("is-over-limit", length > serviceInfo.maxTextChars);
    }

    async function checkService() {
      if (API_CONFIG.mode !== "local" || !API_CONFIG.healthEndpoint) {
        setStatus("已配置外部校对接口，请确认接口服务可用。", "ready");
        return;
      }

      try {
        const response = await fetch(API_CONFIG.healthEndpoint);
        if (!response.ok) {
          throw new Error("HEALTH_CHECK_FAILED");
        }

        const data = await response.json();
        serviceInfo = {
          provider: data?.provider || serviceInfo.provider,
          model: data?.model || serviceInfo.model,
          maxTextChars: data?.maxTextChars || serviceInfo.maxTextChars
        };
        updateCharCounter();
        setStatus(`校对服务已就绪：${getModelLabel()}。${data?.loaded ? "模型已加载。" : "首次校对会自动加载模型。"}`, "ready");
      } catch {
        setStatus("未连接到本地校对服务，请先运行 python server.py 后再演示。", "error");
      }
    }

    function ensureApiReady() {
      return Boolean(API_CONFIG.endpoint);
    }

    function buildRequestBody(text) {
      if (API_CONFIG.mode === "local") {
        return { text };
      }

      return {
        model: API_CONFIG.model,
        messages: [
          { role: "system", content: PROOFREAD_PROMPT },
          { role: "user", content: text }
        ],
        temperature: 0
      };
    }

    function readApiResult(data) {
      return (
        data?.choices?.[0]?.message?.content ??
        data?.output_text ??
        data?.correctedText ??
        data?.result ??
        data?.text ??
        ""
      );
    }

    async function requestProofread(text) {
      if (!ensureApiReady()) {
        throw new Error("API_NOT_CONFIGURED");
      }

      const headers = { "Content-Type": "application/json" };
      if (API_CONFIG.apiKey) {
        headers.Authorization = `Bearer ${API_CONFIG.apiKey}`;
      }

      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), API_CONFIG.requestTimeoutMs);

      let response;
      try {
        response = await fetch(API_CONFIG.endpoint, {
          method: "POST",
          headers,
          body: JSON.stringify(buildRequestBody(text)),
          signal: controller.signal
        });
      } catch (error) {
        if (error.name === "AbortError") {
          throw new Error("校对超时，请稍后重试或缩短文本");
        }
        throw new Error("校对服务连接失败，请确认 python server.py 正在运行");
      } finally {
        window.clearTimeout(timeoutId);
      }

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData?.message || "API_REQUEST_FAILED");
      }

      const data = await response.json();
      const corrected = readApiResult(data);

      if (typeof corrected !== "string" || corrected.length === 0) {
        throw new Error("API_RESULT_EMPTY");
      }

      return corrected;
    }

    async function handleProofread() {
      const text = sourceText.value;

      if (!text.trim()) {
        showToast("请输入待校对文本");
        sourceText.focus();
        return;
      }

      if (text.length > serviceInfo.maxTextChars) {
        showToast(`文本过长，请控制在 ${serviceInfo.maxTextChars} 字以内`);
        return;
      }

      setLoading(true);

      try {
        const corrected = await requestProofread(text);
        resultText.value = corrected;
        resultMeta.textContent = `使用 ${getModelLabel()} · 原文 ${text.length} 字`;
        resultPanel.classList.add("is-visible");
        checkService();
      } catch (error) {
        if (error.message === "API_NOT_CONFIGURED") {
          showToast("请先配置校对接口");
        } else if (error.message && error.message !== "API_REQUEST_FAILED") {
          showToast(error.message);
        } else {
          showToast("校对失败，请稍后重试");
        }
      } finally {
        setLoading(false);
      }
    }

    function fillSample() {
      sourceText.value = SAMPLE_TEXT;
      resultPanel.classList.remove("is-visible");
      resultText.value = "";
      resultMeta.textContent = "";
      updateCharCounter();
      sourceText.focus();
    }

    function clearAll() {
      sourceText.value = "";
      resultText.value = "";
      resultMeta.textContent = "";
      resultPanel.classList.remove("is-visible");
      updateCharCounter();
      sourceText.focus();
    }

    async function copyResult() {
      if (!resultText.value) {
        return;
      }

      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(resultText.value);
        } else {
          copyBySelection();
        }
        showToast("复制成功");
      } catch {
        try {
          copyBySelection();
          showToast("复制成功");
        } catch {
          showToast("复制失败，请手动复制");
        }
      }
    }

    function copyBySelection() {
      resultText.focus();
      resultText.select();
      const copied = document.execCommand("copy");
      window.getSelection()?.removeAllRanges();

      if (!copied) {
        throw new Error("COPY_FAILED");
      }
    }

    sourceText.addEventListener("input", updateCharCounter);
    sampleButton.addEventListener("click", fillSample);
    clearButton.addEventListener("click", clearAll);
    proofreadButton.addEventListener("click", handleProofread);
    copyButton.addEventListener("click", copyResult);
    updateCharCounter();
    checkService();
  </script>
</body>
</html>
